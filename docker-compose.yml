services:
  expense-tracker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expense-tracker-app
    restart: unless-stopped
    ports:
      - "8088:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Data Source=/data/expense-tracker.db
    volumes:
      - expense_tracker_data:/data

volumes:
  expense_tracker_data:
