name: CI - Build and Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore dependencies
      run: dotnet restore ExpenseTracker.Api/ExpenseTracker.Api.csproj
      
    - name: Build
      run: dotnet build ExpenseTracker.Api/ExpenseTracker.Api.csproj --configuration Release --no-restore
      
    - name: Run tests
      run: dotnet test ExpenseTracker.Tests/ExpenseTracker.Tests.csproj --configuration Release --no-build

  docker-build:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker image
      run: docker build -t expense-tracker:latest .
      
    - name: Save Docker image
      run: docker save expense-tracker:latest > expense-tracker.tar

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download Docker image
      run: docker load < expense-tracker.tar
      
    - name: Deploy to server (example)
      run: |
        echo "Deploying to server..."
        echo "This step would connect to your server and run docker-compose"
        echo "Make sure to configure SSH keys and server details"
